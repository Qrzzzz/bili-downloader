name: Bug report
description: 报告程序问题或异常行为
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        提交前请确认日志和截图已经脱敏。不要上传 Cookie、登录态、`storage_state.json`、`cookies.txt`、浏览器 profile 或账号信息。
  - type: input
    id: os
    attributes:
      label: 系统版本
      description: 例如 Windows 10 22H2、Windows 11 24H2
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: 程序版本
      description: 请填写 Release 版本、commit hash 或本地构建说明。
      placeholder: v0.1.0 / commit hash
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python 版本
      description: 如果从源码运行，请填写 Python 版本；如果只使用 exe，可填“不适用”。
      placeholder: Python 3.12.10 / 不适用
    validations:
      required: true
  - type: dropdown
    id: packaged
    attributes:
      label: 运行方式
      options:
        - 打包 exe
        - 从源码运行
        - 其他
    validations:
      required: true
  - type: textarea
    id: symptom
    attributes:
      label: 问题现象
      description: 请描述实际发生了什么。
      placeholder: 程序在点击解析后提示失败……
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供可以复现问题的最小步骤。
      placeholder: |
        1. 打开程序
        2. 输入链接
        3. 点击解析
        4. 看到错误
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏 crash.log 或日志片段
      description: 请只粘贴脱敏后的相关片段，不要上传完整登录态、Cookie、账号信息或本机隐私路径。
      render: text
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认
      options:
        - label: 我没有上传 Cookie、登录态、`storage_state.json`、`cookies.txt` 或浏览器 profile。
          required: true
        - label: 我已经对日志、截图和路径做了必要脱敏。
          required: true
        - label: 这个问题不是请求绕过付费、会员、DRM、地区限制、风控或访问权限限制。
          required: true
